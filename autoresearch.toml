[research]
goal = "Increase test coverage of Codex Autoresearch by adding meaningful tests"
metric = "collected pytest tests"
direction = "higher"
verify = "pytest --collect-only -q | tail -n 1 | grep -Eo '[0-9]+'"
scope = ["src/**", "tests/**", "README.md"]
guard = "pytest"
iterations = 2
min_delta = 1.0

[runtime]
codex_command = "codex exec"
auto_stage_all = true

[git]
branch_prefix = "autoresearch"

[files]
prompt_file = ".autoresearch/prompt.md"
log_tsv = ".autoresearch/results.tsv"
scratch_dir = ".autoresearch"
